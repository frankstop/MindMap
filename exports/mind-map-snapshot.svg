<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1050" viewBox="0 0 1600 1050" role="img" aria-labelledby="title desc">
  <title id="title">Codex Memory Mind Map Snapshot</title>
  <desc id="desc">A readable source-backed concept map of Codex memory notes about Frank Valdez and recurring work areas.</desc>
  <defs>
    <filter id="nodeShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <style>
      .title { font: 700 40px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 18px Arial, sans-serif; fill: #475569; }
      .line { stroke: #94a3b8; stroke-width: 3; opacity: 0.68; }
      .node { filter: url(#nodeShadow); stroke: #fff; stroke-width: 5; }
      .plate { fill: rgba(15, 23, 42, 0.80); stroke: rgba(255, 255, 255, 0.62); stroke-width: 1.4; }
      .label { font: 700 18px Arial, sans-serif; fill: #fff; text-anchor: middle; dominant-baseline: middle; }
      .small { font: 14px Arial, sans-serif; fill: #334155; }
    </style>
  </defs>

  <rect width="1600" height="1050" fill="#f8fafc"/>
  <text x="70" y="78" class="title">Codex Memory Mind Map Snapshot</text>
  <text x="70" y="116" class="subtitle">Source scope: Codex memory only. Frozen visual export, 2026-06-24.</text>

